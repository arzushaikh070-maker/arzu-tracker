<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arzu Tracker">
<meta name="theme-color" content="#1D9E75">
<title>Arzu · Fat Loss Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap');

:root {
  /* Brand colors */
  --bg-deep: #070a13;
  --bg-surface: #0c1222;
  --bg-card: rgba(18, 27, 45, 0.65);
  --bg-card-hover: rgba(26, 38, 62, 0.8);
  
  --border-glow: rgba(255, 255, 255, 0.06);
  --border-glow-focus: rgba(16, 185, 129, 0.4);
  
  --color-emerald: #10b981;
  --color-emerald-glow: rgba(16, 185, 129, 0.25);
  --color-cyan: #06b6d4;
  --color-cyan-glow: rgba(6, 182, 212, 0.25);
  --color-amber: #f59e0b;
  --color-amber-glow: rgba(245, 158, 11, 0.25);
  --color-rose: #f43f5e;
  --color-rose-glow: rgba(244, 63, 94, 0.25);
  
  /* Text colors */
  --text-primary: #f8fafc;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  
  /* 3D and shadow tokens */
  --shadow-3d-sm: 0 4px 8px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
  --shadow-3d-md: 0 12px 24px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.07);
  --shadow-3d-lg: 0 24px 48px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  --shadow-glow-emerald: 0 0 15px rgba(16, 185, 129, 0.25);
  --shadow-glow-cyan: 0 0 15px rgba(6, 182, 212, 0.25);
  
  --transition-spring: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}

*, *::before, *::after { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
  -webkit-tap-highlight-color: transparent; 
}

html { 
  height: 100%; 
}

body {
  height: 100%;
  background-color: var(--bg-deep);
  background-image: 
    radial-gradient(circle at 15% 15%, rgba(16, 185, 129, 0.07) 0%, transparent 40%),
    radial-gradient(circle at 85% 85%, rgba(6, 182, 212, 0.07) 0%, transparent 45%);
  background-attachment: fixed;
  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: var(--text-primary);
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

/* ── App shell ── */
#app { 
  display: flex; 
  flex-direction: column; 
  height: 100%; 
  position: relative; 
  z-index: 1; 
}

#screen {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-top: max(env(safe-area-inset-top), 16px);
  padding-bottom: calc(96px + env(safe-area-inset-bottom));
}

/* ── Tab bar ── */
#tab-bar {
  position: fixed;
  bottom: 20px; 
  left: 16px; 
  right: 16px;
  background: rgba(12, 18, 34, 0.75);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 24px;
  display: flex;
  padding: 8px 12px;
  box-shadow: var(--shadow-3d-lg);
  z-index: 200;
  transition: var(--transition-smooth);
}

@media (max-width: 375px) {
  #tab-bar {
    bottom: 10px; 
    left: 10px; 
    right: 10px;
    border-radius: 20px;
    padding: 6px 8px;
  }
}

.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 0;
  gap: 4px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text-secondary);
  font-size: 11px;
  font-family: inherit;
  font-weight: 600;
  letter-spacing: .02em;
  transition: var(--transition-smooth);
  border-radius: 16px;
  -webkit-appearance: none;
}

.tab.active { 
  color: var(--color-emerald); 
  background: rgba(16, 185, 129, 0.08);
  text-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
}

.tab svg { 
  width: 22px; 
  height: 22px; 
  stroke: currentColor; 
  fill: none; 
  stroke-width: 2; 
  stroke-linecap: round; 
  stroke-linejoin: round; 
  transition: transform 0.2s ease;
}

.tab:active svg {
  transform: scale(0.9) translateY(1px);
}

/* ── Page header ── */
.page-header { 
  padding: 24px 18px 12px; 
}

.page-header h1 { 
  font-size: 32px; 
  font-weight: 800; 
  letter-spacing: -1px; 
  background: linear-gradient(135deg, #ffffff 40%, var(--text-secondary) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.page-header .subtitle { 
  font-size: 14px; 
  color: var(--text-secondary); 
  margin-top: 4px; 
  font-weight: 400; 
}

/* ── Sections ── */
.section { 
  padding: 0 16px; 
  margin-bottom: 24px; 
}

.section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-secondary);
  margin-bottom: 10px;
  padding-left: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.section-label::before {
  content: '';
  display: inline-block;
  width: 3px; 
  height: 12px;
  background: var(--color-emerald);
  border-radius: 2px;
  box-shadow: var(--shadow-glow-emerald);
}

/* ── Cards ── */
.card {
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 20px;
  border: 1px solid var(--border-glow);
  box-shadow: var(--shadow-3d-md);
  overflow: hidden;
  transition: var(--transition-smooth);
}

.card:hover {
  border-color: rgba(255, 255, 255, 0.1);
  box-shadow: var(--shadow-3d-lg);
}

/* ── Stat tiles ── */
.stats-grid { 
  display: grid; 
  grid-template-columns: 1fr 1fr; 
  gap: 12px; 
}

.stat-tile {
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 18px;
  border: 1px solid var(--border-glow);
  padding: 16px;
  box-shadow: var(--shadow-3d-sm);
  transition: var(--transition-spring);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

.stat-tile::after {
  content: '';
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, transparent 100%);
  pointer-events: none;
}

.stat-tile.accent { 
  background: linear-gradient(135deg, #065f46 0%, #10b981 100%); 
  border-color: rgba(16, 185, 129, 0.3);
  box-shadow: 0 10px 20px rgba(16, 185, 129, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.2);
}

.stat-tile.accent .s-label, 
.stat-tile.accent .s-sub { 
  color: rgba(255, 255, 255, 0.8); 
}

.stat-tile.accent .s-value { 
  color: #ffffff; 
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
}

.s-label { 
  font-size: 11px; 
  color: var(--text-secondary); 
  margin-bottom: 6px; 
  font-weight: 700; 
  text-transform: uppercase; 
  letter-spacing: .05em; 
}

.s-value { 
  font-family: 'Barlow Condensed', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 26px; 
  font-weight: 700; 
  letter-spacing: -0.5px; 
  line-height: 1.1; 
  color: var(--text-primary); 
}

.s-sub { 
  font-size: 12px; 
  color: var(--text-muted); 
  margin-top: 4px; 
  font-weight: 400; 
}

/* ── Day progress bar ── */
.day-prog-track { 
  height: 6px; 
  background: rgba(255, 255, 255, 0.05); 
  overflow: hidden; 
}

.day-prog-fill { 
  height: 100%; 
  background: linear-gradient(90deg, var(--color-emerald) 0%, #34d399 100%); 
  box-shadow: var(--shadow-glow-emerald);
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
}

/* ── Checklist ── */
.check-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  cursor: pointer;
  transition: var(--transition-smooth);
  -webkit-appearance: none;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
}

.check-row:hover { 
  background: rgba(255, 255, 255, 0.02); 
}

.check-row:active { 
  background: rgba(255, 255, 255, 0.04); 
  transform: scale(0.99); 
}

.check-row + .check-row { 
  border-top: 1px solid rgba(255, 255, 255, 0.04); 
}

.chk-box {
  width: 24px; 
  height: 24px;
  border-radius: 8px;
  border: 1.5px solid rgba(255, 255, 255, 0.2);
  flex-shrink: 0;
  display: flex; 
  align-items: center; 
  justify-content: center;
  transition: var(--transition-spring);
  background: rgba(255, 255, 255, 0.03);
  box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.4);
}

.chk-box:hover {
  border-color: rgba(255, 255, 255, 0.4);
  background: rgba(255, 255, 255, 0.06);
}

.chk-box.checked { 
  background: linear-gradient(135deg, var(--color-emerald) 0%, #10b981 100%); 
  border-color: var(--color-emerald); 
  box-shadow: 0 0 10px var(--color-emerald-glow), inset 0 1px 1px rgba(255, 255, 255, 0.2);
}

.chk-box svg { 
  width: 14px; 
  height: 14px; 
  stroke: #ffffff; 
  fill: none; 
  stroke-width: 3; 
  stroke-linecap: round; 
  stroke-linejoin: round; 
  opacity: 0; 
  transform: scale(0.5) rotate(-10deg);
  transition: var(--transition-spring); 
}

.chk-box.checked svg { 
  opacity: 1; 
  transform: scale(1) rotate(0deg); 
}

.chk-label { 
  font-size: 15.5px; 
  color: var(--text-primary); 
  flex: 1; 
  line-height: 1.4; 
  transition: var(--transition-smooth); 
}

.chk-label.done { 
  color: var(--text-muted); 
  text-decoration: line-through; 
  opacity: 0.7; 
}

/* ── Log rows ── */
.log-row {
  display: flex;
  align-items: center;
  padding: 14px 18px;
  gap: 12px;
}

.log-row + .log-row { 
  border-top: 1px solid rgba(255, 255, 255, 0.04); 
}

.log-row .lr-label { 
  font-size: 15.5px; 
  flex: 1; 
  color: var(--text-primary); 
  font-weight: 500; 
}

.log-row .lr-sub { 
  font-size: 12px; 
  color: var(--text-muted); 
}

.log-input {
  width: 120px;
  padding: 10px 12px;
  font-size: 15px;
  font-family: inherit;
  border: 1.5px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.2);
  color: var(--text-primary);
  text-align: right;
  -webkit-appearance: none;
  appearance: none;
  transition: var(--transition-smooth);
  box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
}

.log-input:focus { 
  outline: none; 
  border-color: var(--color-emerald); 
  box-shadow: 0 0 12px var(--color-emerald-glow), inset 0 2px 4px rgba(0, 0, 0, 0.3);
}

.log-select {
  padding: 10px 12px;
  font-size: 15px;
  font-family: inherit;
  border: 1.5px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.2);
  color: var(--text-primary);
  -webkit-appearance: none;
  appearance: none;
  text-align: right;
  min-width: 100px;
  transition: var(--transition-smooth);
  box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
  cursor: pointer;
}

.log-select:focus { 
  outline: none; 
  border-color: var(--color-emerald); 
  box-shadow: 0 0 12px var(--color-emerald-glow); 
}

/* ── Weight input ── */
.weight-hero { 
  padding: 24px 20px; 
  display: flex; 
  align-items: center; 
  gap: 12px; 
}

.weight-num-wrap { 
  display: flex; 
  align-items: baseline; 
  gap: 6px; 
}

.weight-input {
  font-family: 'Barlow Condensed', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 48px;
  font-weight: 800;
  letter-spacing: -1px;
  width: 130px;
  border: none;
  background: transparent;
  color: var(--text-primary);
  -webkit-appearance: none;
  appearance: none;
  caret-color: var(--color-emerald);
  border-bottom: 2px dashed rgba(255, 255, 255, 0.15);
  transition: var(--transition-smooth);
}

.weight-input:focus { 
  outline: none; 
  border-bottom-color: var(--color-emerald); 
}

.weight-unit { 
  font-size: 22px; 
  font-weight: 600; 
  color: var(--text-secondary); 
}

.delta-pill {
  margin-left: auto;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-secondary);
  white-space: nowrap;
  box-shadow: var(--shadow-3d-sm);
  border: 1px solid rgba(255, 255, 255, 0.05);
  transition: var(--transition-spring);
}

.delta-pill.good { 
  background: rgba(16, 185, 129, 0.12); 
  color: #34d399; 
  border-color: rgba(16, 185, 129, 0.2); 
  box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
}

.delta-pill.bad { 
  background: rgba(244, 63, 94, 0.12); 
  color: #fb7185; 
  border-color: rgba(244, 63, 94, 0.2);
  box-shadow: 0 0 10px rgba(244, 63, 94, 0.1);
}

/* ── Textarea ── */
.notes-area {
  width: 100%;
  padding: 16px;
  font-size: 15px;
  font-family: inherit;
  line-height: 1.6;
  border: none;
  background: transparent;
  color: var(--text-primary);
  resize: none;
  min-height: 100px;
  -webkit-appearance: none;
}

.notes-area:focus { 
  outline: none; 
}

.notes-area::placeholder { 
  color: var(--text-muted); 
}

/* ── Week pills ── */
.week-strip {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 0 16px 20px;
  scrollbar-width: none;
}

.week-strip::-webkit-scrollbar { 
  display: none; 
}

.week-pill {
  flex-shrink: 0;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  border: 1px solid var(--border-glow);
  background: rgba(12, 18, 34, 0.4);
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition-spring);
  -webkit-appearance: none;
  font-family: inherit;
  box-shadow: var(--shadow-3d-sm);
}

.week-pill:hover {
  color: var(--text-primary);
  border-color: rgba(255, 255, 255, 0.15);
}

.week-pill.active { 
  background: linear-gradient(135deg, var(--color-emerald) 0%, #10b981 100%); 
  border-color: var(--color-emerald); 
  color: #ffffff; 
  font-weight: 700; 
  box-shadow: 0 8px 16px var(--color-emerald-glow);
}

/* ── Target banner ── */
.target-banner {
  margin: 0 16px 20px;
  background: linear-gradient(135deg, #091325 0%, #11223e 100%);
  border-radius: 20px;
  border: 1px solid rgba(6, 182, 212, 0.2);
  padding: 18px 20px;
  color: #ffffff;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: var(--shadow-3d-md);
}

.tb-label { 
  font-size: 11px; 
  color: var(--text-secondary); 
  font-weight: 700; 
  text-transform: uppercase; 
  letter-spacing: .08em; 
  margin-bottom: 4px; 
}

.tb-val { 
  font-family: 'Barlow Condensed', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 24px; 
  font-weight: 700; 
  color: #06b6d4; 
  text-shadow: 0 0 10px rgba(6, 182, 212, 0.2); 
}

.tb-arrow { 
  font-size: 24px; 
  color: rgba(255, 255, 255, 0.2); 
}

/* ── Day accordion ── */
.day-card { 
  background: var(--bg-card); 
  border-radius: 20px; 
  border: 1px solid var(--border-glow); 
  margin-bottom: 12px; 
  overflow: hidden; 
  transition: var(--transition-spring);
  box-shadow: var(--shadow-3d-sm);
}

.day-card:hover {
  border-color: rgba(255, 255, 255, 0.12);
  box-shadow: var(--shadow-3d-md);
}

.day-head {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  cursor: pointer;
  -webkit-appearance: none;
  background: none;
  border: none;
  width: 100%;
  font-family: inherit;
  text-align: left;
  transition: var(--transition-smooth);
}

.day-head:hover { 
  background: rgba(255, 255, 255, 0.02); 
}

.day-head:active { 
  background: rgba(255, 255, 255, 0.04); 
}

.day-dot { 
  width: 10px; 
  height: 10px; 
  border-radius: 50%; 
  flex-shrink: 0; 
  box-shadow: 0 0 8px currentColor; 
}

.day-dot.training { 
  background: var(--color-emerald); 
  color: var(--color-emerald); 
}

.day-dot.rest { 
  background: var(--color-cyan); 
  color: var(--color-cyan); 
}

.day-dot.active-rest { 
  background: var(--color-amber); 
  color: var(--color-amber); 
}

.day-head-text { 
  flex: 1; 
}

.dh-name { 
  font-size: 17px; 
  font-weight: 700; 
  color: var(--text-primary); 
  display: flex; 
  align-items: center; 
  gap: 8px; 
}

.dh-type { 
  font-size: 13px; 
  margin-top: 3px; 
  font-weight: 500; 
}

.dh-type.training { 
  color: #34d399; 
}

.dh-type.rest { 
  color: #22d3ee; 
}

.dh-type.active-rest { 
  color: #fbbf24; 
}

.day-right { 
  text-align: right; 
}

.day-right .dr-frac { 
  font-family: 'Barlow Condensed', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 18px; 
  font-weight: 700; 
  color: var(--text-primary); 
}

.day-right .dr-pct { 
  font-size: 12px; 
  color: var(--text-muted); 
  margin-top: 2px; 
}

.today-badge {
  font-size: 10px;
  background: linear-gradient(135deg, var(--color-emerald) 0%, #10b981 100%);
  color: #ffffff;
  border-radius: 6px;
  padding: 2px 8px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  box-shadow: 0 2px 6px var(--color-emerald-glow);
}

/* ── Progress rings ── */
.ring-row { 
  display: flex; 
  align-items: center; 
  gap: 16px; 
  padding: 16px 18px; 
}

.ring-row + .ring-row { 
  border-top: 1px solid rgba(255, 255, 255, 0.04); 
}

.ring-svg-wrap { 
  position: relative; 
  width: 50px; 
  height: 50px; 
  flex-shrink: 0; 
}

.ring-svg-wrap svg { 
  width: 50px; 
  height: 50px; 
  transform: rotate(-90deg); 
  filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
}

.ring-bg { 
  fill: none; 
  stroke: rgba(255, 255, 255, 0.05); 
  stroke-width: 4.5; 
}

.ring-arc { 
  fill: none; 
  stroke-width: 4.5; 
  stroke-linecap: round; 
  transition: stroke-dashoffset .4s ease; 
}

.ring-pct {
  position: absolute; 
  inset: 0;
  display: flex; 
  align-items: center; 
  justify-content: center;
  font-family: 'Barlow Condensed', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 12px; 
  font-weight: 700;
}

.ring-body { 
  flex: 1; 
}

.ring-title { 
  font-size: 15.5px; 
  font-weight: 600; 
  color: var(--text-primary); 
}

.ring-sub { 
  font-size: 13px; 
  color: var(--text-secondary); 
  margin-top: 2px; 
}

.ring-frac { 
  font-family: 'Barlow Condensed', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 18px; 
  font-weight: 700; 
}

/* ── Milestone ── */
.milestone-row {
  display: flex; 
  align-items: flex-start; 
  gap: 14px;
  padding: 16px 18px; 
  cursor: pointer;
  background: none; 
  border: none; 
  width: 100%;
  font-family: inherit; 
  text-align: left;
  transition: var(--transition-smooth);
}

.milestone-row:hover { 
  background: rgba(255, 255, 255, 0.02); 
}

.milestone-row:active { 
  transform: scale(0.99); 
}

.milestone-row + .milestone-row { 
  border-top: 1px solid rgba(255, 255, 255, 0.04); 
}

.ms-label { 
  font-size: 15.5px; 
  flex: 1; 
  line-height: 1.4; 
  color: var(--text-primary); 
}

.ms-label.done { 
  color: var(--text-muted); 
  text-decoration: line-through; 
  opacity: 0.7; 
}

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: calc(105px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px) scale(0.9);
  background: rgba(12, 18, 34, 0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: #ffffff;
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 14.5px;
  font-weight: 600;
  opacity: 0;
  transition: opacity .3s, transform .3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  pointer-events: none;
  z-index: 300;
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
  white-space: nowrap;
  max-width: 90vw;
  text-overflow: ellipsis;
  overflow: hidden;
}

#toast.show { 
  opacity: 1; 
  transform: translateX(-50%) translateY(0) scale(1); 
}

/* ── Divider ── */
.divider { 
  height: 1px; 
  background: rgba(255, 255, 255, 0.04); 
  margin: 0 18px; 
}

/* ── Empty state ── */
.empty-state { 
  text-align: center; 
  padding: 48px 24px; 
  color: var(--text-muted); 
  font-size: 16px; 
}

/* ── 3D Card Tilt ── */
.card-3d {
  position: relative;
  transform-style: preserve-3d;
  perspective: 1000px;
  transform: perspective(1000px) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)) translateZ(var(--tz, 0px));
  transition: transform 0.15s ease-out, box-shadow 0.15s ease-out, border-color 0.15s ease-out;
}

.card-3d:hover {
  --tz: 8px;
}
</style>
</head>
<body>
<div id="app">
  <div id="screen"></div>
  <nav id="tab-bar">
    <button class="tab active" id="tab-today" onclick="nav('today')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      Today
    </button>
    <button class="tab" id="tab-week" onclick="nav('week')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Week
    </button>
    <button class="tab" id="tab-log" onclick="nav('log')">
      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Log
    </button>
    <button class="tab" id="tab-stats" onclick="nav('stats')">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Stats
    </button>
  </nav>
</div>
<div id="toast"></div>

<script>
/* ── DATA ── */
const DAYS = [
  { name:'Monday',   short:'Mon', type:'training',    typeLabel:'Training day 💪',    session:'Chest · Shoulders · Triceps · Abs', cal:'2,200', items:['Workout completed 🏋️‍♂️','Calories on target (2,200 kcal) 🥗','Protein 145 g or more 🥩','Water 3.8 L 💧','No liquid calories 🚫🥤','7+ hours sleep 😴'] },
  { name:'Tuesday',  short:'Tue', type:'rest',         typeLabel:'Rest day 🧘',        session:'Cardio 40 min',                     cal:'1,850', items:['Cardio completed (40 min) 🏃‍♂️','Calories on target (1,850 kcal) 🥗','Protein 145 g or more 🥩','Water 2.5 L 💧','No liquid calories 🚫🥤','7+ hours sleep 😴'] },
  { name:'Wednesday',short:'Wed', type:'training',    typeLabel:'Training day 💪',    session:'Legs · Back · Biceps · Calves',     cal:'2,200', items:['Workout completed 🏋️‍♂️','Calories on target (2,200 kcal) 🥗','Protein 145 g or more 🥩','Water 3.8 L 💧','No liquid calories 🚫🥤','7+ hours sleep 😴'] },
  { name:'Thursday', short:'Thu', type:'rest',         typeLabel:'Rest day 🧘',        session:'Cardio 40 min',                     cal:'1,850', items:['Cardio completed (40 min) 🏃‍♂️','Calories on target (1,850 kcal) 🥗','Protein 145 g or more 🥩','Water 2.5 L 💧','No liquid calories 🚫🥤','7+ hours sleep 😴'] },
  { name:'Friday',   short:'Fri', type:'training',    typeLabel:'Training day 💪',    session:'Chest · Shoulders · Triceps · Abs', cal:'2,200', items:['Workout completed 🏋️‍♂️','Calories on target (2,200 kcal) 🥗','Protein 145 g or more 🥩','Water 3.8 L 💧','No liquid calories 🚫🥤','7+ hours sleep 😴'] },
  { name:'Saturday', short:'Sat', type:'training',    typeLabel:'Training day 💪',    session:'Legs · Back · Biceps · Calves',     cal:'2,200', items:['Workout completed 🏋️‍♂️','Calories on target (2,200 kcal) 🥗','Protein 145 g or more 🥩','Water 3.8 L 💧','No liquid calories 🚫🥤','7+ hours sleep 😴'] },
  { name:'Sunday',   short:'Sun', type:'active-rest', typeLabel:'Active rest 🚶',     session:'30-min walk + weekly refeed',       cal:'2,100', items:['30-min walk done 🚶','Refeed on plan (2,100 kcal) 🥞','Protein 150 g or more 🥩','Water 2.5 L 💧','No liquid calories 🚫🥤','7+ hours sleep 😴'] }
];

const WEEK_TARGETS = [65.5, 65.1, 64.7, 64.2, 63.8, 63.4, 63.0];

const MILESTONES = [
  'Baseline measurements recorded (Week 1) 📏',
  'Week 2 photos taken 📸',
  'Week 3 measurements done 📐',
  'Week 4 mid-check completed ⚖️',
  'Week 6 final photos taken 📸',
  'Goal weight reached (63 kg) 🎯',
  'Transition to maintenance started 🚀'
];

/* ── STATE ── */
let S = {};
let page = 'today';
let week = 1;
let expanded = {};

function load() {
  try { const r = localStorage.getItem('arzu_tracker_v3'); if (r) S = JSON.parse(r); } catch(e) { S = {}; }
}
function save() {
  try { localStorage.setItem('arzu_tracker_v3', JSON.stringify(S)); } catch(e) {}
}
function get(k, fallback='') { return S[k] !== undefined ? S[k] : fallback; }
function set(k, v) { S[k] = v; save(); }

function checks(w, d) { return get('ck_w'+w+'_d'+d, {}); }
function setCheck(w, d, i, v) { const c = {...checks(w,d)}; c[i] = v; set('ck_w'+w+'_d'+d, c); }
function checksDone(w, d) { const c = checks(w,d); return Object.values(c).filter(Boolean).length; }

/* ── HELPERS ── */
function todayIdx() { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; }
function pct(done, total) { return total ? Math.round((done/total)*100) : 0; }
function weightDelta(val) {
  const v = parseFloat(val);
  if (isNaN(v)) return { text: 'enter weight', cls: '' };
  const d = parseFloat((v - 66).toFixed(1));
  if (d < 0) return { text: d + ' kg ↓', cls: 'good' };
  if (d > 0) return { text: '+' + d + ' kg ↑', cls: 'bad' };
  return { text: 'no change', cls: '' };
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ── NAVIGATION ── */
function nav(p) {
  page = p;
  expanded = {};
  ['today','week','log','stats'].forEach(id => {
    document.getElementById('tab-'+id).classList.toggle('active', id === p);
  });
  render();
  document.getElementById('screen').scrollTop = 0;
}

/* ── RENDER ROUTER ── */
function render() {
  const el = document.getElementById('screen');
  if (page === 'today') el.innerHTML = renderToday();
  else if (page === 'week') el.innerHTML = renderWeek();
  else if (page === 'log') el.innerHTML = renderLog();
  else el.innerHTML = renderStats();
  
  // Initialize 3D tilts for newly rendered elements
  init3dCards();
}

/* ── TODAY ── */
function renderToday() {
  const di = todayIdx();
  const day = DAYS[di];
  const c = checks(week, di);
  const done = Object.values(c).filter(Boolean).length;
  const total = day.items.length;
  const p = pct(done, total);

  let h = `<div class="page-header">
    <h1>Today</h1>
    <div class="subtitle">${day.name} &nbsp;·&nbsp; Week ${week} &nbsp;·&nbsp; ${day.typeLabel}</div>
  </div>`;

  h += `<div class="section"><div class="stats-grid">
    <div class="stat-tile accent card-3d">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 6px; opacity: 0.9;"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
      <div class="s-label">Calories</div>
      <div class="s-value">${day.cal}</div>
      <div class="s-sub">kcal target</div>
    </div>
    <div class="stat-tile card-3d">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="var(--color-emerald)" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 6px;"><path d="M12 22c5.523 0 10-4.477 10-10S17.522 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
      <div class="s-label">Checked off</div>
      <div class="s-value">${done} / ${total}</div>
      <div class="s-sub">${p}% done</div>
    </div>
    <div class="stat-tile card-3d">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="var(--color-amber)" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 6px;"><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h2"/><path d="M18 18h2a2 2 0 0 0 2-2v-5a2 2 0 0 0-2-2h-2"/><path d="M6 12h12"/><path d="M7.5 8v8"/><path d="M16.5 8v8"/></svg>
      <div class="s-label">Protein min</div>
      <div class="s-value">145 g</div>
      <div class="s-sub">every day</div>
    </div>
    <div class="stat-tile card-3d">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="var(--color-cyan)" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 6px;"><path d="M12 22a7 7 0 0 0 7-7c0-4.3-7-11-7-11S5 10.7 5 15a7 7 0 0 0 7 7z"/></svg>
      <div class="s-label">Water goal</div>
      <div class="s-value">${day.type === 'training' ? '3.8' : '2.5'} L</div>
      <div class="s-sub">today</div>
    </div>
  </div></div>`;

  h += `<div class="section">
    <div class="section-label">${day.session}</div>
    <div class="card card-3d">
      <div class="day-prog-track"><div class="day-prog-fill" style="width:${p}%"></div></div>`;
  day.items.forEach((item, i) => {
    const chk = !!c[i];
    h += `<button class="check-row" onclick="tapCheck(${di},${i})">
      <div class="chk-box${chk?' checked':''}"><svg viewBox="0 0 14 14"><polyline points="2,7 6,11 12,3"/></svg></div>
      <span class="chk-label${chk?' done':''}">${item}</span>
    </button>`;
  });
  h += `</div></div>`;

  h += `<div class="section">
    <div class="section-label">Notes for today</div>
    <div class="card card-3d">
      <textarea class="notes-area" placeholder="Energy, hunger, how the workout felt…" oninput="set('note_today_w${week}_d${di}',this.value)">${get('note_today_w'+week+'_d'+di)}</textarea>
    </div>
  </div>`;

  return h;
}

/* ── WEEK ── */
function renderWeek() {
  const di = todayIdx();
  let h = `<div class="page-header"><h1>Week ${week}</h1><div class="subtitle">7-week BFFM fat loss plan</div></div>`;

  h += `<div class="week-strip">`;
  for (let w = 1; w <= 7; w++) h += `<button class="week-pill${w===week?' active':''}" onclick="setWeek(${w})">Week ${w}</button>`;
  h += `</div>`;

  h += `<div class="target-banner card-3d">
    <div><div class="tb-label">Start</div><div class="tb-val">66.0 kg</div></div>
    <div class="tb-arrow">→</div>
    <div style="text-align:right"><div class="tb-label">Week ${week} target</div><div class="tb-val">${WEEK_TARGETS[week-1]} kg</div></div>
  </div>`;

  h += `<div class="section"><div class="section-label">All days</div>`;
  DAYS.forEach((day, i) => {
    const done = checksDone(week, i);
    const total = day.items.length;
    const p = pct(done, total);
    const isToday = i === di;
    const open = !!expanded[i];
    const c = checks(week, i);

    h += `<div class="day-card card-3d">
      <button class="day-head" onclick="toggleDay(${i})">
        <div class="day-dot ${day.type}"></div>
        <div class="day-head-text">
          <div class="dh-name">${day.name}${isToday ? '&nbsp;<span class="today-badge">Today</span>' : ''}</div>
          <div class="dh-type ${day.type}">${day.typeLabel} &nbsp;·&nbsp; ${day.cal} kcal</div>
        </div>
        <div class="day-right">
          <div class="dr-frac">${done}/${total}</div>
          <div class="dr-pct">${p}%</div>
        </div>
      </button>
      <div class="day-prog-track"><div class="day-prog-fill" style="width:${p}%"></div></div>
      <div class="day-body" style="max-height: ${open ? '500px' : '0px'}; overflow: hidden; transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);">`;
      
      day.items.forEach((item, j) => {
        const chk = !!c[j];
        h += `<button class="check-row" onclick="tapCheckWeek(${i},${j})">
          <div class="chk-box${chk?' checked':''}"><svg viewBox="0 0 14 14" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,7 6,11 12,3"/></svg></div>
          <span class="chk-label${chk?' done':''}">${item}</span>
        </button>`;
      });
      h += `</div></div>`;
  });
  h += `</div>`;

  h += `<div class="section">
    <div class="section-label">Week ${week} notes</div>
    <div class="card card-3d">
      <textarea class="notes-area" placeholder="Energy levels, plateau signs, what worked, adjustments…" oninput="set('note_week_w${week}',this.value)">${get('note_week_w'+week)}</textarea>
    </div>
  </div>`;

  return h;
}

/* ── LOG ── */
function renderLog() {
  const w = week;
  const wv = get('weight_w'+w);
  const dlt = weightDelta(wv);

  let h = `<div class="page-header"><h1>Log</h1><div class="subtitle">Week ${w} · measurements &amp; lifts</div></div>`;

  h += `<div class="week-strip">`;
  for (let ww = 1; ww <= 7; ww++) h += `<button class="week-pill${ww===w?' active':''}" onclick="setWeek(${ww})">Week ${ww}</button>`;
  h += `</div>`;

  /* Weight */
  h += `<div class="section">
    <div class="section-label">Monday weigh-in</div>
    <div class="card card-3d">
      <div class="weight-hero">
        <div class="weight-num-wrap">
          <input class="weight-input" type="number" step="0.1" inputmode="decimal" placeholder="66.0"
            value="${wv}" oninput="handleWeight(this.value)">
          <span class="weight-unit">kg</span>
        </div>
        <div class="delta-pill ${dlt.cls}" id="dpill">${dlt.text}</div>
      </div>
    </div>
  </div>`;

  /* Measurements */
  h += `<div class="section">
    <div class="section-label">Body measurements (cm) 📏</div>
    <div class="card card-3d">`;
  [['mw_'+w,'Waist at navel 📏'],['mh_'+w,'Hips at widest 🍑'],['mc_'+w,'Chest 📐'],['ma_'+w,'Right arm (flexed) 💪'],['mt_'+w,'Right thigh 🦵']].forEach(([k,lbl]) => {
    h += `<div class="log-row">
      <span class="lr-label">${lbl}</span>
      <input class="log-input" type="number" inputmode="decimal" placeholder="— cm" value="${get(k)}" oninput="set('${k}',this.value)">
    </div>`;
  });
  h += `</div></div>`;

  /* Strength */
  h += `<div class="section">
    <div class="section-label">Strength log 🏋️‍♂️</div>
    <div class="card card-3d">`;
  [['sb_'+w,'Bench press 🏋️‍♂️'],['ss_'+w,'Barbell squat 🦵'],['sp_'+w,'Pull-up / lat pulldown 🧗‍♂️'],['sr_'+w,'Seated cable row 🚣‍♂️'],['sc_'+w,'Barbell curl 💪'],['scf_'+w,'Standing calf raise 🦶']].forEach(([k,lbl]) => {
    h += `<div class="log-row">
      <span class="lr-label">${lbl}</span>
      <input class="log-input" type="text" placeholder="kg × reps" value="${get(k)}" oninput="set('${k}',this.value)" style="width:130px">
    </div>`;
  });
  h += `</div></div>`;

  /* Non-negotiables */
  h += `<div class="section">
    <div class="section-label">Weekly non-negotiables 🚫</div>
    <div class="card card-3d">`;
  [['nn_liq_'+w,'No liquid calories all week 🚫🥤'],['nn_slp_'+w,'7+ hrs sleep (average) 😴'],['nn_ref_'+w,'Sunday refeed on plan 🥞'],['nn_ovl_'+w,'Progressive overload logged 📈']].forEach(([k,lbl]) => {
    const v = get(k);
    h += `<div class="log-row">
      <span class="lr-label">${lbl}</span>
      <select class="log-select" onchange="set('${k}',this.value)">
        <option value="" ${!v?'selected':''}>—</option>
        <option value="yes" ${v==='yes'?'selected':''}>✓ Yes</option>
        <option value="no"  ${v==='no'?'selected':''}>✗ No</option>
      </select>
    </div>`;
  });
  h += `</div></div>`;

  return h;
}

/* ── STATS ── */
function renderStats() {
  const w = week;
  let weights=0, cardio=0, proteinDays=0;
  DAYS.forEach((day, i) => {
    const c = checks(w, i);
    if (day.type === 'training' && c[0]) weights++;
    if (day.type === 'rest' && c[0]) cardio++;
    const pi = day.items.findIndex(it => it.includes('Protein'));
    if (pi >= 0 && c[pi]) proteinDays++;
  });

  let h = `<div class="page-header"><h1>Progress</h1><div class="subtitle">7 weeks · 66 kg → 63 kg</div></div>`;

  h += `<div class="week-strip">`;
  for (let ww = 1; ww <= 7; ww++) h += `<button class="week-pill${ww===w?' active':''}" onclick="setWeek(${ww})">${ww}</button>`;
  h += `</div>`;

  h += `<div class="section">
    <div class="section-label">Week ${w} sessions</div>
    <div class="card card-3d">
      ${ringRow('Weight sessions', weights, 4, 'var(--color-emerald)')}
      ${ringRow('Cardio sessions', cardio, 2, 'var(--color-cyan)')}
      ${ringRow('Protein days hit', proteinDays, 7, 'var(--color-amber)')}
    </div>
  </div>`;

  /* Weight log table */
  h += `<div class="section">
    <div class="section-label">Weight log — all weeks</div>
    <div class="card card-3d">
      <div class="log-row" style="background: rgba(255, 255, 255, 0.02)">
        <span class="lr-label" style="font-size:13px;color:var(--text-secondary)">Week</span>
        <span style="font-size:13px;color:var(--text-secondary)">Logged &nbsp;/&nbsp; Target</span>
      </div>`;
  for (let ww = 1; ww <= 7; ww++) {
    const logged = get('weight_w'+ww);
    const target = WEEK_TARGETS[ww-1];
    const isCur = ww === w;
    let valColor = 'var(--text-muted)';
    if (logged) valColor = parseFloat(logged) <= target ? 'var(--color-emerald)' : 'var(--color-rose)';
    h += `<div class="log-row" style="${isCur?'background: rgba(16, 185, 129, 0.08)':''}">
      <span class="lr-label" style="${isCur?'font-weight:700;color:var(--color-emerald)':''}">${ww === w ? '→ ' : ''}Week ${ww}</span>
      <span style="font-size:15px;color:${valColor};font-weight:600">
        ${logged ? logged+' kg' : '—'}
        <span style="color:var(--text-muted);font-size:13px;font-weight:400"> / ${target}</span>
      </span>
    </div>`;
  }
  h += `</div></div>`;

  /* Milestones */
  h += `<div class="section">
    <div class="section-label">7-week milestones</div>
    <div class="card card-3d">`;
  MILESTONES.forEach((m, i) => {
    const done = !!get('ms_'+i, false);
    h += `<button class="milestone-row" onclick="tapMilestone(${i})">
      <div class="chk-box${done?' checked':''}"><svg viewBox="0 0 14 14" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,7 6,11 12,3"/></svg></div>
      <span class="ms-label${done?' done':''}">${m}</span>
    </button>`;
  });
  h += `</div></div>`;

  return h;
}

function ringRow(title, val, max, color) {
  const r = 18, circ = +(2*Math.PI*r).toFixed(2);
  const offset = +(circ - circ*(val/max)).toFixed(2);
  const p = Math.round((val/max)*100);
  return `<div class="ring-row">
    <div class="ring-svg-wrap">
      <svg viewBox="0 0 46 46">
        <circle class="ring-bg" cx="23" cy="23" r="${r}"/>
        <circle class="ring-arc" cx="23" cy="23" r="${r}" stroke="${color}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="filter: drop-shadow(0 0 3px ${color}40)"/>
      </svg>
      <div class="ring-pct" style="color:${color}">${p}%</div>
    </div>
    <div class="ring-body"><div class="ring-title">${title}</div><div class="ring-sub">${val} of ${max} completed</div></div>
    <div class="ring-frac" style="color:${color}">${val}/${max}</div>
  </div>`;
}

/* ── ACTIONS ── */
function tapCheck(di, i) {
  const prev = !!checks(week, di)[i];
  setCheck(week, di, i, !prev);
  if (!prev) toast('✓ ' + DAYS[di].items[i]);
  render();
}
function tapCheckWeek(di, i) {
  const prev = !!checks(week, di)[i];
  setCheck(week, di, i, !prev);
  if (!prev) toast('✓ ' + DAYS[di].items[i]);
  render();
}
function toggleDay(i) { expanded[i] = !expanded[i]; render(); }
function setWeek(w) { week = w; expanded = {}; render(); document.getElementById('screen').scrollTop = 0; }
function tapMilestone(i) { set('ms_'+i, !get('ms_'+i, false)); render(); }
function handleWeight(val) {
  set('weight_w'+week, val);
  const pill = document.getElementById('dpill');
  if (pill) { const d = weightDelta(val); pill.className='delta-pill '+d.cls; pill.textContent=d.text; }
}

/* ── 3D Card Tilt Initialization ── */
function init3dCards() {
  if (window.matchMedia('(hover: none)').matches) return;
  
  document.querySelectorAll('.card-3d').forEach(card => {
    // Reset properties to default initially
    card.style.setProperty('--rx', '0deg');
    card.style.setProperty('--ry', '0deg');
    
    card.addEventListener('mousemove', e => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const xc = rect.width / 2;
      const yc = rect.height / 2;
      const angle = 6; // Max degree tilt
      const rx = -(y - yc) / yc * angle;
      const ry = (x - xc) / xc * angle;
      card.style.setProperty('--rx', `${rx}deg`);
      card.style.setProperty('--ry', `${ry}deg`);
    });
    
    card.addEventListener('mouseleave', () => {
      card.style.setProperty('--rx', '0deg');
      card.style.setProperty('--ry', '0deg');
    });
  });
}

/* ── BOOT ── */
load();
render();
</script>
